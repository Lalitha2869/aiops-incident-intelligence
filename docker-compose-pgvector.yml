services:

  pgvector:

    image: pgvector/pgvector:pg17

    container_name: aiops-pgvector

    environment:
      POSTGRES_DB: aiops_vector_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2869

    ports:
      - "5433:5432"

    volumes:
      - pgvector_data:/var/lib/postgresql/data

volumes:
  pgvector_data: